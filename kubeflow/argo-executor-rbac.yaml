# Additional RBAC required beyond Argo Workflows' base install.yaml —
# discovered by actually submitting a workflow and watching it fail
# twice, not found in the install docs beforehand.
#
# install.yaml's argo-cluster-role grants the "argo" ServiceAccount only
# list/watch/deletecollection on workflowtaskresults (for the controller's
# own aggregation/cleanup). It does NOT grant create/get/patch, which is
# what each step pod's executor needs to report its own result back —
# failed with "workflowtaskresults.argoproj.io is forbidden ... cannot
# create resource" on the very first submission attempt.
#
# Separately, passing a moderately-sized parameter (the base64-encoded
# model) between steps triggers Argo's automatic large-parameter
# offloading to a ConfigMap, which needs its own create/update permission
# — failed with "configmaps is forbidden ... cannot create resource" on
# the second attempt, after fixing the first issue.
#
# Apply this in the same namespace workflows run in (argo, here) after
# the base install.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-executor-role
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "get", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update", "patch", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-executor-binding
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-executor-role
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
