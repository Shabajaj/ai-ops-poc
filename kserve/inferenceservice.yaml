# KServe InferenceService — serves the "pod-crashloop-classifier" model
# registered in MLflow (see ../mlflow_tracking/train_and_register.py) as a
# REST endpoint on Kubernetes.
#
# STATUS: written for conceptual walkthrough, NOT deployed against a live
# cluster. I don't have a running KServe/Knative install for this interview
# timeline. Everything below is a real, valid KServe v1beta1 manifest —
# what's "demo-scoped" is that I haven't run `kubectl apply` against it, not
# that the YAML itself is fake or simplified.
#
# --- How MLflow's Model Registry connects to this manifest ---
# KServe's predictor reads model artifacts from object storage (S3/GCS/Azure
# Blob/PVC) via `storageUri` — it does NOT call the MLflow Model Registry API
# directly. So the real pipeline is:
#   1. train_and_register.py registers a version and (if it passes the
#      promotion gate) moves the "production" alias to it in MLflow
#   2. A sync step (not built in this POC — would be a small script or CI
#      job) copies that model version's artifacts from MLflow's artifact
#      store to the S3 path referenced below by storageUri
#   3. This InferenceService's storageUri is updated to point at the new
#      path, which is what actually triggers KServe to roll out a new
#      revision
# This gap (registry alias -> object storage sync) is a real production
# consideration worth naming explicitly if asked "how does this connect
# end-to-end" — it's not automatic just because both tools are Kubernetes shows.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: pod-crashloop-classifier
  namespace: mlops-poc
  annotations:
    # --- Canary rollout knob (see "Canary rollout" section below) ---
    # KServe canary rollout works differently from a typical Argo Rollouts/
    # Istio VirtualService split: it's a single InferenceService object.
    # When you update spec.predictor (e.g. a new storageUri for a new model
    # version), KServe creates a new Knative Revision for it but does NOT
    # cut traffic over immediately. This annotation controls what percentage
    # of traffic the NEW revision gets; the remainder stays on the last
    # revision that had 100% traffic (the de facto "stable" version).
    #
    # Set to 0 here = fully on the current model, no canary in flight.
    # See the "canary rollout, step by step" comment block below for how
    # this value changes during an actual rollout.
    serving.kserve.io/canaryTrafficPercent: "0"
spec:
  predictor:
    # minReplicas: 1 keeps this warm instead of scaling to zero — trades a
    # small always-on cost for avoiding cold-start latency on the first
    # request after idle. KServe/Knative default to scale-to-zero, which is
    # great for cost but adds multi-second latency on a cold request; for a
    # model backing an alerting/RCA workflow, that cold-start latency is
    # usually not acceptable, hence pinning minReplicas.
    minReplicas: 1
    maxReplicas: 3

    model:
      # KServe's built-in MLflow model server understands the MLmodel
      # artifact format directly (conda env + model.pkl + MLmodel file) —
      # no custom container needed for a plain scikit-learn model like this.
      modelFormat:
        name: mlflow
      protocolVersion: v2

      # Points at the model artifacts for the CURRENT production version
      # (see the artifact-sync note above — this is not a live MLflow
      # registry URI, it's wherever the synced artifacts live in object
      # storage). Version number in the path is illustrative.
      storageUri: "s3://mlops-poc-models/pod-crashloop-classifier/v3/"

      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"

    # Credentials for the storageUri above. In a real cluster this
    # ServiceAccount would be annotated/bound to IRSA (IAM Roles for
    # Service Accounts) rather than embedding static credentials — omitted
    # here since there's no real bucket behind this POC.
    serviceAccountName: kserve-model-reader

# --- Canary rollout, step by step (for interview walkthrough) ---
# (Not a second resource — no `---` document separator above, since the
# canary flow below mutates the single InferenceService already defined,
# it doesn't create a new one. Keeping it comment-only avoids `kubectl
# apply -f` choking on a stray empty YAML document.)
#
# This is intentionally shown as a sequence of comments rather than a
# second live resource, since KServe canary rollout mutates the SAME
# InferenceService object above rather than creating a second one — there
# is no separate "canary InferenceService" resource in this API, unlike a
# typical two-Deployment blue/green setup.
#
# Step 1 — ship a new model version, start it at a small traffic slice:
#   kubectl patch isvc pod-crashloop-classifier -n mlops-poc --type merge -p '
#     spec:
#       predictor:
#         model:
#           storageUri: "s3://mlops-poc-models/pod-crashloop-classifier/v4/"
#   '
#   kubectl annotate isvc pod-crashloop-classifier -n mlops-poc \
#     serving.kserve.io/canaryTrafficPercent=10 --overwrite
#
#   -> KServe creates a new Knative Revision for v4 and routes 10% of
#      traffic to it; 90% keeps going to the v3 revision already running.
#      Both revisions are live simultaneously — this is what makes it a
#      true canary rather than a hard cutover.
#
# Step 2 — watch error rate / latency / (in this POC's world) drift_exporter
# output for the canary revision specifically. KServe/Knative expose
# per-revision metrics, so this can be scoped to just the v4 traffic slice
# rather than the blended total.
#
# Step 3a — looks good, increase the slice progressively:
#   kubectl annotate isvc pod-crashloop-classifier -n mlops-poc \
#     serving.kserve.io/canaryTrafficPercent=50 --overwrite
#   # ... then eventually:
#   kubectl annotate isvc pod-crashloop-classifier -n mlops-poc \
#     serving.kserve.io/canaryTrafficPercent=100 --overwrite
#   # at 100%, v4 is now the de facto stable revision; the next model
#   # version would canary against v4 in turn.
#
# Step 3b — looks bad, roll back instantly by pinning traffic back to 0
# for the canary (no need to re-apply the old storageUri — the v3 revision
# is still live in the background until traffic is fully drained from it):
#   kubectl annotate isvc pod-crashloop-classifier -n mlops-poc \
#     serving.kserve.io/canaryTrafficPercent=0 --overwrite
#
# This is conceptually the same pattern as the AKS canary work referenced
# in my background — a small live-traffic slice, a rollback path that
# doesn't require a redeploy, and a promotion path that's gradual rather
# than instant — just expressed through KServe/Knative revisions instead of
# an Ingress/service-mesh weighted routing rule.
